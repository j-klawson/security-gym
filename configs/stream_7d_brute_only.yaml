# 7-day brute-force only — short test stream
#
# Single attack type, low campaign rate. Useful for quick iteration
# and verifying the composition pipeline.
#
# Usage:
#   python -m attacks compose configs/stream_7d_brute_only.yaml

stream:
  duration: 7d
  seed: 123

  benign:
    db: ../data/benign_v4.db
    ebpf_sample_rate: 0.242       # 24.2% — simulates single busy server (~785K eBPF events/day)

  attacks:
    db: ../data/campaigns_v2.db
    campaigns_per_day: 1.0

    distribution:
      brute_force: 1.0

  output:
    db: ../data/exp_7d_brute_v4.db
