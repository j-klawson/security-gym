campaign:
  name: "Redis Kill Chain — Recon → Redis Exploit → SSH Post-Auth"
  description: >
    Three-phase kill chain simulating an attacker who discovers Redis via
    port scanning, exploits CVE-2022-0543 for initial access, then pivots
    to SSH with credentials found during post-exploitation.  Covers
    Reconnaissance, Initial Access, Execution, and Discovery tactics.
  seed: 42

  target:
    host: 192.168.2.201
    ssh_user: researcher
    ssh_key: ~/.ssh/isildur_research
    ssh_port: 22

  phases:
    # Phase 1: SYN scan discovers port 6379
    - name: "Network Reconnaissance"
      module: recon
      mitre_technique: "T1046"
      mitre_tactic: "TA0043"
      attack_type: discovery
      attack_stage: recon
      severity: 1
      params:
        ports: [22, 80, 443, 6379, 8080, 3306]
        scan_type: syn
      ip_source:
        strategy: spoofed
        count: 500
        subnet: "10.0.0.0/8"
      timing:
        duration_seconds: 120
        profile: constant
        jitter_ms: [50, 300]
        delay_after_seconds: 30

    # Phase 2: Redis Lua sandbox escape (CVE-2022-0543)
    - name: "Redis Exploitation"
      module: redis_lua_escape
      mitre_technique: "T1190"
      mitre_tactic: "TA0001"
      attack_type: web_exploit
      attack_stage: initial_access
      severity: 3
      params:
        target_port: 6379
        command_profile: full_recon
        inter_command_delay_ms: [500, 2000]
      ip_source:
        strategy: aliased
        count: 3
        subnet: "192.168.2.0/24"
        start_offset: 170
        interface: enp3s0
      timing:
        duration_seconds: 480
        profile: custom
        delay_after_seconds: 45
        profile_params:
          phases:
            - label: enumeration
              fraction: 0.15
              jitter_ms: [1500, 4000]
            - label: exploitation
              fraction: 0.1
              jitter_ms: [100, 500]
            - label: post_exploitation
              fraction: 0.75
              jitter_ms: [800, 3000]

    # Phase 3: SSH pivot using credentials found in Redis post-exploit
    - name: "SSH Pivot — Post-Auth Execution"
      module: ssh_post_auth
      mitre_technique: "T1059.004"
      mitre_tactic: "TA0002"
      attack_type: execution
      attack_stage: execution
      severity: 3
      params:
        username: researcher
        password: "pass123"
        command_profile: full_recon
        target_port: 22
        inter_command_delay_ms: [1000, 5000]
      ip_source:
        strategy: aliased
        count: 2
        subnet: "192.168.2.0/24"
        start_offset: 175
        interface: enp3s0
      timing:
        duration_seconds: 300
        profile: constant
        jitter_ms: [3000, 8000]
        delay_after_seconds: 30

  collection:
    ebpf:
      enabled: true
      baseline_seconds: 30
    log_sources:
      - name: auth_log
        parser: auth_log
        remote_path: /var/log/auth.log
      - name: syslog
        parser: syslog
        remote_path: /var/log/syslog
      - name: web_access
        parser: web_access
        remote_path: /var/log/nginx/access.log
      - name: web_error
        parser: web_error
        remote_path: /var/log/nginx/error.log
      - name: journal
        parser: journal
        remote_command: "journalctl --since '1 hour ago' -o json"
      - name: auditd
        parser: auditd
        remote_command: "sudo -n ausearch -k research_exploit --raw"
    output:
      db_path: data/campaigns_v2.db
      time_buffer_seconds: 60
