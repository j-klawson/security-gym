name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,attacks]"
      - name: Run tests
        run: pytest tests/ attacks/tests/ --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/ attacks/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pip-audit bandit
      - name: Audit dependencies
        # Audit only security-gym's declared dependency closure, not the CI
        # tooling. pip-audit must be installed alongside the project to run, so
        # auditing the ambient environment also flags advisories in the audit
        # tooling itself (pip, and pip-audit's own requests/urllib3/idna/pygments
        # transitive deps) that security-gym does not ship. Resolve the project's
        # [dev] closure in a clean venv and audit that requirements set instead.
        run: |
          python -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/pip install --quiet --upgrade pip
          /tmp/audit-venv/bin/pip install --quiet ".[dev]"
          /tmp/audit-venv/bin/pip freeze --exclude-editable \
            | grep -iv '^security[-_]gym' > /tmp/audit-reqs.txt
          pip-audit --requirement /tmp/audit-reqs.txt
      - name: Static security analysis
        run: bandit -r src/ -c pyproject.toml
